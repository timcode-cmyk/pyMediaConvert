name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller MediaTools.spec

      - name: Zip Build Release
        run: |
          Compress-Archive -Path dist/MediaTools/* -DestinationPath dist/MediaTools-Windows.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MediaTools-Windows
          path: dist/MediaTools-Windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/MediaTools-Windows.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MediaTools-Windows.zip
          generate_release_notes: true
