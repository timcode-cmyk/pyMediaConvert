name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.platform_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            platform_tag: win-x64
            is_win: true
          - os: macos-latest # Apple Silicon Mac
            platform: macos-arm64
            platform_tag: mac-AppleSilicon

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka
          python build.py

      - name: Extract Version from Tag
        shell: bash
        run: |
          # 将 v1.13.5 转换为 1.13.5
          VERSION=${GITHUB_REF_NAME#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BASENAME=MediaTools-v$VERSION-${{ matrix.platform_tag }}" >> $GITHUB_ENV

      # --- 平台差异化准备步骤 ---
      - name: Set up NSIS (Windows)
        if: matrix.is_win
        run: choco install nsis -y

      - name: Prepare Binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x bin/ffmpeg bin/ffprobe || true

      # --- Nuitka 构建步骤 ---

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --windows-console-mode=disable --assume-yes-for-downloads --output-dir=dist-nuitka `
          --windows-icon-from-ico=MediaTools.ico `
          --nofollow-import-to=yt_dlp --no-deployment-flag=excluded-module-usage `
          --include-module=optparse --include-module=asyncio --include-package=pyMediaTools `
          --plugin-enable=pyside6 --include-qt-plugins=multimedia,platforms,styles,imageformats `
          --include-data-files=MediaTools.ico=MediaTools.ico --include-data-files=bin/ffmpeg.exe=bin/ffmpeg.exe `
          --include-data-files=bin/ffprobe.exe=bin/ffprobe.exe --include-data-files=config.toml=config.toml `
          --include-data-dir=assets=assets MediaTools.py

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka --standalone --macos-app-icon=Icon.icns --assume-yes-for-downloads --macos-create-app-bundle --output-dir=dist-nuitka \
          --macos-app-version=${{ env.APP_VERSION }} \
          --nofollow-import-to=yt_dlp --no-deployment-flag=excluded-module-usage \
          --include-module=optparse --include-module=asyncio --include-package=pyMediaTools \
          --plugin-enable=pyside6 --include-qt-plugins=multimedia,platforms,styles,imageformats \
          --include-data-files=bin/ffmpeg=bin/ffmpeg --include-data-files=bin/ffprobe=bin/ffprobe \
          --include-data-files=config.toml=config.toml --include-data-dir=assets=assets MediaTools.py

      # --- 拷贝依赖库 ---
      - name: Copy Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          xcopy "yt_dlp" "dist-nuitka\MediaTools.dist\yt_dlp\" /E /I /H /Y

      - name: Copy Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          cp -R yt_dlp/ dist-nuitka/MediaTools.app/Contents/MacOS/yt_dlp/
          
      # --- 打包安装程序 ---
      - name: Build Installer (Windows)
        if: matrix.is_win
        run: |
          ls dist-nuitka/MediaTools.dist
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DVERSION="${{ env.APP_VERSION }}" `
            /DOUTFILE="${{ env.BASENAME }}.exe" `
            installer.nsi
  
      # --- 统一打包逻辑 (已移除冗余，修复 mkdir) ---
      - name: Final Package
        shell: bash
        run: |
          mkdir -p out
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            powershell.exe -Command "Compress-Archive -Path 'dist-nuitka/MediaTools.dist/*' -DestinationPath 'out/${{ env.BASENAME }}.zip' -Force"
            
            if [ -f "${{ env.BASENAME }}.exe" ]; then
              mv "${{ env.BASENAME }}.exe" out/
            fi
          else
            xattr -cr dist-nuitka/MediaTools.app
            chmod -R +x dist-nuitka/MediaTools.app/Contents/MacOS/
            codesign --force --deep --sign - dist-nuitka/MediaTools.app
            mkdir -p dist-dmg
            cp -R dist-nuitka/MediaTools.app dist-dmg/
            ln -s /Applications dist-dmg/Applications
            hdiutil create -srcfolder dist-dmg \
                           -volname "MediaTools" \
                           -format UDZO \
                           -ov \
                           "out/${{ env.BASENAME }}.dmg"
          fi

      - name: Debug Output
        shell: bash
        run: |
          echo "Checking out directory content:"
          ls -R out/

      # --- 新增：上传产物 ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.platform_tag }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          # 不指定 name 会下载所有 artifact
          path: release-dist
          merge-multiple: true

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release-dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 修正：添加了 .dmg 并确保路径正确
          files: |
            release-dist/*.zip
            release-dist/*.exe
            release-dist/*.dmg
          generate_release_notes: true