name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            artifact_zip: MediaTools-Windows.zip
            artifact_exe: MediaTools-Installer.exe
          - os: macos-13 # Intel Mac
            platform: macos-x86_64
            artifact_zip: MediaTools-macOS-Intel.zip
          - os: macos-latest # Apple Silicon Mac
            platform: macos-arm64
            artifact_zip: MediaTools-macOS-AppleSilicon.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka
          python build.py

      - name: Extract Version from Tag
        shell: bash
        run: |
          # 将 v1.13.5 转换为 1.13.5
          VERSION=${GITHUB_REF_NAME#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Current Version: $VERSION"

      # --- 平台差异化准备步骤 ---

      - name: Prepare Binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x bin/ffmpeg bin/ffprobe || true

      # --- Nuitka 构建步骤 ---

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --windows-console-mode=disable --output-dir=dist-nuitka `
          --windows-icon-from-ico=MediaTools.ico `
          --windows-app-version=${{ env.APP_VERSION }} `
          --product-version=${{ env.APP_VERSION }} `
          --nofollow-import-to=yt_dlp --no-deployment-flag=excluded-module-usage `
          --include-module=optparse --include-module=asyncio --include-package=pyMediaTools `
          --plugin-enable=pyside6 --include-qt-plugins=multimedia,platforms,styles,imageformats `
          --include-data-files=MediaTools.ico=MediaTools.ico --include-data-files=bin/ffmpeg.exe=bin/ffmpeg.exe `
          --include-data-files=bin/ffprobe.exe=bin/ffprobe.exe --include-data-files=config.toml=config.toml `
          --include-data-dir=assets=assets MediaTools.py

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka --standalone --macos-create-app-bundle --output-dir=dist-nuitka \
          --macos-app-version=${{ env.APP_VERSION }} \
          --macos-product-version=${{ env.APP_VERSION }} \
          --nofollow-import-to=yt_dlp --no-deployment-flag=excluded-module-usage \
          --include-module=optparse --include-module=asyncio --include-package=pyMediaTools \
          --plugin-enable=pyside6 --include-qt-plugins=multimedia,platforms,styles,imageformats \
          --include-data-files=bin/ffmpeg=bin/ffmpeg --include-data-files=bin/ffprobe=bin/ffprobe \
          --include-data-files=config.toml=config.toml --include-data-dir=assets=assets MediaTools.py

      # --- 拷贝依赖库 ---
      - name: Copy Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          xcopy "yt_dlp" "dist-nuitka\MediaTools.dist\yt_dlp\" /E /I /H /Y

      - name: Copy Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          cp -R yt_dlp/ dist-nuitka/MediaTools.app/Contents/MacOS/yt_dlp/
          
      # --- 打包安装程序 ---
      - name: Build Installer (Windows)
        if: runner.os == 'Windows'
        run: makensis /DVERSION=${{ env.APP_VERSION }} installer.nsi
      
      # --- 整理产物 ---
      - name: Package Artifacts
        shell: bash
        run: |
          mkdir out
          if [ "${{ runner.os }}" == "Windows" ]; then
            cd dist-nuitka/MediaTools.dist && zip -r ../../out/${{ matrix.artifact_zip }} * && cd ../..
            [ -f "MediaTools-Installer.exe" ] && mv "MediaTools-Installer.exe" "out/${{ matrix.artifact_exe }}"
          else
            cd dist-nuitka && zip -r ../out/${{ matrix.artifact_zip }} MediaTools.app && cd ..
          fi
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: out/*
      

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      # --- Artifact Attestation 核心配置 ---
      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v2
        with:
          # 此路径包含所有下载的产物（ZIP 和 EXE）
          subject-path: 'release-dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*.zip
            release-dist/*.exe
          generate_release_notes: true