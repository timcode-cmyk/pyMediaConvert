name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Download ffmpeg and aria2c
        run: |
          # 运行项目自带的构建脚本下载 ffmpeg 等二进制文件
          python build.py
          # 单独下载并解压 Windows 版本的 aria2c.exe 到 bin 目录
          if (!(Test-Path bin)) { mkdir bin }
          curl -L "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip" -o aria2.zip
          Expand-Archive -Path aria2.zip -DestinationPath aria2_extracted -Force
          Move-Item -Path "aria2_extracted\aria2-1.37.0-win-64bit-build1\aria2c.exe" -Destination "bin\aria2c.exe" -Force

      - name: Build with Nuitka
        run: |
          nuitka --standalone --windows-console-mode=disable --output-dir=dist-nuitka --windows-icon-from-ico=MediaTools.ico --nofollow-import-to=yt_dlp --no-deployment-flag=excluded-module-usage --include-module=optparse --include-module=asyncio --include-package=pyMediaTools --plugin-enable=pyside6 --include-qt-plugins=multimedia,platforms,styles,imageformats --include-data-dir=yt_dlp=yt_dlp --include-data-files=bin\aria2c.exe=bin\aria2c.exe --include-data-files=MediaTools.ico=MediaTools.ico --include-data-files=bin\ffmpeg.exe=bin\ffmpeg.exe --include-data-files=bin\ffprobe.exe=bin\ffprobe.exe --include-data-files=config.toml=config.toml --include-data-dir=assets=assets MediaTools.py

      - name: Zip Build Release
        run: |
          if (!(Test-Path dist)) { mkdir dist }
          Compress-Archive -Path dist-nuitka/MediaTools.dist/* -DestinationPath dist/MediaTools-Windows.zip -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MediaTools-Windows
          path: dist/MediaTools-Windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/MediaTools-Windows.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MediaTools-Windows.zip
          generate_release_notes: true
