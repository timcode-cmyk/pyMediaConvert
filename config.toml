## 全局用户名设置

[username]
x = "(w-text_w)-40"
y = 80
font_size = 24
font_color = "white"
font_path = "assets/Roboto-Bold.ttf"
use_box = false
box_color = "black"
box_opacity = 0.5
box_padding = 10

[modes.image]
class = "AddCustomLogo"
description = "6. 添加 ImageFromAI"
output_ext = ""
support_exts = [".mp4", ".png", ".jpg", ".jpeg"]

[modes.image.params]
x = "W-tw-10"
y = 40
font_path = "assets/Roboto-Bold.ttf"
font_size = "30"
font_color = "white"
text = "AI Created"

[modes.image1]
class = "AddAssText"
description = "6. 添加 AI-जनित"
output_ext = ""
support_exts = [".mp4", ".png", ".jpg", ".jpeg"]
 
[modes.image1.params]
ass = "assets/AI-Hindi.ass"

[modes.image3]
class = "AddAssText"
description = "6. 添加 Dibuat dengan AI"
output_ext = ""
support_exts = [".mp4", ".png", ".jpg", ".jpeg"]
 
[modes.image3.params]
ass = "assets/AI-Indonesia.ass"
 

[modes.h264]
class = "H264Converter"
description = "7. 转换为 H.264 (MP4)"
output_ext = "_h264.mp4"
support_exts = [".mov", ".avi", ".mkv", ".mp4", ".webm"]

[modes.h264.params]

[modes.x264]
class = "H264Converter"
description = "8. 转换为 H.264 (压缩)"
output_ext = "_x264.mp4"
support_exts = [".mov", ".avi", ".mkv", ".mp4", ".webm"]

[modes.x264.params]
video_codec = "libx264"
preset_key = "-crf"
preset_value = "20"

[modes.dnxhr]
class = "DnxhrConverter"
description = "9. 转换为 DNxHR (MOV)"
output_ext = "_dnxhr.mov"
support_exts = [".mp4", ".avi", ".mkv", ".mov", ".webm"]

[modes.dnxhr.params]
video_codec = "dnxhr_hq"

[modes.dnxhr_hqx]
class = "DnxhrConverter"
description = "10. 转换为 DNxHR (10bit MOV)"
output_ext = "_dnxhr.mov"
support_exts = [".mp4", ".avi", ".mkv", ".mov", ".webm"]

[modes.dnxhr_hqx.params]
video_codec = "dnxhr_hqx"

[modes.png]
class = "PngConverter"
description = "11. 图片转换为 PNG"
output_ext = "_processed.png"
support_exts = [".jpg", ".bmp", ".png", ".webp", ".tiff"]

[modes.png.params]

[modes.mp3]
class = "Mp3Converter"
description = "12. 音频转换为 MP3"
output_ext = "_processed.mp3"
support_exts = [".mp3", ".wav", ".flac", ".ogg", ".mpeg", ".m4a", ".aiff"]

[modes.mp3.params]

[modes.wav]
class = "WavConverter"
description = "13. 音频转换为 WAV"
output_ext = "_processed.wav"
support_exts = [".mp3", ".wav", ".flac", ".ogg", ".mpeg", ".m4a", ".aiff", ".mp4", ".avi", ".mkv", ".mov", ".webm"]

[modes.wav.params]

[modes.videotoolbox]
class = "VideoTooboxConverter"
description = "14. 使用 VideoToolbox 转码为 H.264 (Mac 专用)"
output_ext = "_vtb.mp4"
support_exts = [".mov", ".avi", ".mkv", ".mp4", ".webm"]

[modes.videotoolbox.params]



# ElevenLabs 配置

[elevenlabs]
api_key = ""
default_output_format = "mp3_44100_128"
supported_output_formats = ["mp3_44100_128", "mp3_44100_192", "pcm_44100", "pcm_48000"]
# ⭐ 模型、语言、情绪配置
default_model_id = "eleven_multilingual_v2"  # 默认模型：multilingual v2
default_language_code = ""  # 语言代码，留空则自动检测
default_emotion = ""  # 留空，情绪现在通过文本中的 [emotion] 标签指定
srt_max_chars = 35
srt_pause_threshold = 0.2
srt_delimiters = [" ", "\n", "।", ":", "：", "？", "?", "!", "！", ",", "，"]
srt_sentence_enders = [".", "\n", "।", ",", "，", ":", "：", "？", "?", "!", "！", "…"]  
debug_save_response = false    #是否保存 ElevenLabs API 的原始响应以供调试

# Groq 配置
[groq]
api_key = "" 
model = "openai/gpt-oss-120b"
timeout_seconds = 300
# XML 配置
[xml_styles]
# 字体样式配置
[xml_styles.source] 
alignment = "center" # 对齐方式: left, center, right
fontColor = [1.0, 1.0, 1.0, 1.0] # 字体颜色: RGBA 数组
font = "Arial" # 字体名称
fontSize = 28 # 字体大小
bold = false # 是否加粗
italic = false # 是否斜体
strokeColor = [0.0, 0.0, 0.0, 1.0] # 描边颜色: RGBA 数组
strokeWidth = 2.0 # 描边宽度
useStroke = true # 是否使用描边
lineSpacing = 0 # 行间距
pos = -45 # 位置偏移
shadowColor = [0.0, 0.0, 0.0, 0.5] # 阴影颜色: RGBA 数组
shadowOffset = [2, 2] # 阴影偏移: [x, y]
useShadow = true # 是否使用阴影
backgroundColor = [0.0, 0.0, 0.0, 0.0] # 背景颜色: RGBA 数组
useBackground = false # 是否使用背景
backgroundPadding = 0 # 背景内边距

# 翻译字体样式配置
[xml_styles.translate]
alignment = "center" # 对齐方式: left, center, right
fontColor = [1.0, 1.0, 1.0, 1.0] # 字体颜色: RGBA 数组
font = "Arial" # 字体名称
fontSize = 25 # 字体大小
bold = false # 是否加粗
italic = false # 是否斜体
strokeColor = [0.0, 0.0, 0.0, 1.0]
strokeWidth = 2.0
useStroke = true
lineSpacing = 0
pos = -38
shadowColor = [0.0, 0.0, 0.0, 0.5]
shadowOffset = [2, 2]
useShadow = true
backgroundColor = [0.0, 0.0, 0.0, 0.0]
useBackground = true
backgroundPadding = 0

# 高亮字体样式配置
[xml_styles.highlight]
alignment = "center"
fontColor = [1.0, 1.0, 0.0, 1.0]
font = "Arial"
fontSize = 33
bold = true
italic = false
strokeColor = [0.0, 0.0, 0.0, 1.0]
strokeWidth = 2.0
useStroke = true
lineSpacing = 0
pos = -38
shadowColor = [0.0, 0.0, 0.0, 0.5]
shadowOffset = [2, 2]
useShadow = true
backgroundColor = [1.0, 1.0, 1.0, 1.0]
useBackground = true
backgroundPadding = 5
